services:
  postgres:
    image: postgres:16-alpine
    container_name: barberbookings-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: barberbookings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - barberbookings_postgres_data:/var/lib/postgresql/data

volumes:
  barberbookings_postgres_data:
